<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C7D2FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A5B4FC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkPaperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="24" y="32" width="64" height="64" rx="8" fill="url(#darkPaperGrad)" stroke="#4338CA" stroke-width="2"/>
  
  <path d="M24,32 L72,32 L72,72 L56,88 L24,64 Z" fill="url(#paperGrad)" stroke="#6366F1" stroke-width="2"/>
  
  <rect x="32" y="44" width="32" height="3" rx="1.5" fill="#93C5FD" opacity="0.8"/>
  <rect x="32" y="56" width="28" height="3" rx="1.5" fill="#93C5FD" opacity="0.6"/>
  <rect x="32" y="68" width="36" height="3" rx="1.5" fill="#93C5FD" opacity="0.8"/>
  <rect x="36" y="80" width="24" height="3" rx="1.5" fill="#93C5FD" opacity="0.6"/>
  
  <g filter="url(#glow)">
    <circle cx="92" cy="48" r="8" fill="url(#nodeGrad)" stroke="#0891B2" stroke-width="1"/>
    <circle cx="100" cy="64" r="6" fill="url(#nodeGrad)" stroke="#0891B2" stroke-width="1"/>
    <circle cx="84" cy="72" r="7" fill="url(#nodeGrad)" stroke="#0891B2" stroke-width="1"/>
    <circle cx="96" cy="80" r="6" fill="url(#nodeGrad)" stroke="#0891B2" stroke-width="1"/>
    
    <line x1="92" y1="48" x2="100" y2="64" stroke="#06B6D4" stroke-width="2"/>
    <line x1="100" y1="64" x2="84" y2="72" stroke="#06B6D4" stroke-width="2"/>
    <line x1="84" y1="72" x2="96" y2="80" stroke="#06B6D4" stroke-width="2"/>
    <line x1="92" y1="48" x2="84" y2="72" stroke="#06B6D4" stroke-width="1.5"/>
  </g>
</svg>